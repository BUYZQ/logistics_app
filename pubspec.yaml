name: logistics_app
description: "Мобильное приложение товарной логистики ООО Проект-Инвест"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.3.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  yandex_mapkit: ^4.2.1
  http: ^1.2.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
